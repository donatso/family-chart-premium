<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family Chart Creator | Premium Experience</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="/family-chart-premium/playground/assets/index-Co70967X.js"></script>
  <link rel="stylesheet" crossorigin href="/family-chart-premium/playground/assets/index-0SikuGaw.css">
</head>
<body>
  <div id="App">
    <header class="creator-header">
      <div class="logo-container">
        <img src="data:image/svg+xml,%3c?xml%20version='1.0'%20encoding='utf-8'?%3e%3csvg%20version='1.1'%20id='Layer_1'%20xmlns='http://www.w3.org/2000/svg'%20xmlns:xlink='http://www.w3.org/1999/xlink'%20x='0px'%20y='0px'%20viewBox='0%200%20110%2060'%20style='enable-background:new%200%200%20110%2060;'%20xml:space='preserve'%3e%3crect%20width='110'%20height='60'%20fill='rgba(33,33,33,%200.1)'%3e%3c/rect%3e%3cg%20transform='translate(5,5)'%3e%3cline%20x1='50'%20x2='50'%20y1='35'%20y2='7.5'%20stroke-width='1'%20stroke='white'%3e%3c/line%3e%3cline%20x1='40'%20x2='60'%20y1='7.5'%20y2='7.5'%20stroke-width='1'%20stroke='white'%3e%3c/line%3e%3crect%20x='0'%20y='0'%20width='40'%20height='15'%20fill='lightblue'%20rx='2'%20ry='2'%3e%3c/rect%3e%3crect%20x='60'%20y='0'%20width='40'%20height='15'%20fill='lightpink'%20rx='2'%20ry='2'%3e%3c/rect%3e%3crect%20x='30'%20y='35'%20width='40'%20height='15'%20fill='lightblue'%20rx='2'%20ry='2'%3e%3c/rect%3e%3c/g%3e%3c/svg%3e" alt="Family Chart Logo" class="logo">
        <span class="app-title">Family Chart <span class="accent">Creator</span></span>
      </div>
      <div class="header-actions">
        <button id="ExportBtn" class="btn btn-primary">Export Project</button>
      </div>
    </header>

    <main id="Main">
      <aside id="ConfigPanel" class="config-panel">
        <div class="panel-header">
          <div class="header-main">
            <h2>Configuration</h2>
            <label class="advanced-toggle">
              <input type="checkbox" id="AdvancedModeToggle">
              <span class="toggle-label">Advanced</span>
            </label>
          </div>
        </div>
        <div id="PanelTabs" class="panel-tabs">
          <button class="panel-tab-btn active" data-panel-tab="config">Configuration</button>
          <button class="panel-tab-btn" data-panel-tab="data">Raw Data</button>
          <button style="display: none;" class="panel-tab-btn" data-panel-tab="js">JS</button>
        </div>
        <div id="PanelContent" class="panel-content panel-tab-content active">
          <!-- Modifiers will be injected here -->
        </div>
        <div id="DataPanel" class="data-panel panel-tab-content"></div>
        <div id="JsPanel" class="js-panel panel-tab-content"></div>
      </aside>

      <div id="FamilyChartCanvas">
        <div id="FamilyChart" class="f3" style="height: 100%;"></div>
      </div>
    </main>

    <div id="ExportModal" class="modal">
      <div class="modal-content glass">
        <div class="modal-header">
          <h3>Export Your Project</h3>
          <button class="close-modal">&times;</button>
        </div>
        <div class="modal-body">
          <div class="tabs export-tabs">
            <button style="display: none;" class="tab-btn" data-tab="json">JSON</button>
            <button class="tab-btn active" data-tab="FULL HTML">FULL HTML</button>
            <button class="tab-btn" data-tab="VUE">VUE</button>
            <button class="tab-btn" data-tab="REACT">REACT</button>
            <button class="tab-btn" data-tab="ANGULAR">ANGULAR</button>
            <button class="tab-btn" data-tab="SVELTE">SVELTE</button>
            <button class="tab-btn" data-tab="JS">JS</button>
          </div>
          <div id="JsonOutput" class="tab-content active">
            <pre><code id="JsonCode"></code></pre>
          </div>
          <div id="ExportOutput" class="tab-content">
            <pre><code id="ExportCode"></code></pre>
          </div>
        </div>
        <div class="modal-footer">
          <button id="ModalCopyBtn" class="btn btn-primary copy-btn" data-target="JsonCode">Copy to Clipboard</button>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
